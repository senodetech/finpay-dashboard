<p-confirmdialog />
<p-toast />
<div class="p-4">

    <h2>FinPay Transaction Dashboard</h2>

    <p-button
    label="Add Transaction"
    icon="pi pi-plus"
    (onClick)="openDialog()">
    </p-button>

    <br />
    <br />

    <p-dialog
        header="Create Transaction"
        [visible]="dialogVisible()"
        (visibleChange)="dialogVisible.set($event)"
        [modal]="true"
        [style]="{ width: '30rem', height: '30rem' }">

        <form
            [formGroup]="transactionForm">

            <div>

            <label>
                Customer Name
            </label>

            <br>

            <input
                type="text"
                formControlName="customerName">

            </div>

            <br>

            <div>

            <label>
                Amount
            </label>
             <input
                type="number"
                formControlName="amount">

            </div>

            <br>
           

            <div>

                <label>Status</label>

                <br>

                <p-select
                    [options]="statuses"
                    optionLabel="label"
                    optionValue="value"
                    formControlName="status">
                </p-select>

            </div>

            <br>
            <button
            type="button"
            (click)="saveTransaction()">

            Save

            </button>

        </form>

    </p-dialog>

    <p>
    Total Transactions:
    {{ transactionCount() }}
    </p>

    <input
    type="text"
    placeholder="Search Customer"
    (input)="updateSearch($event)">

    <p-table
        [value]="filteredTransactions()"
        [tableStyle]="{'min-width': '60rem'}"
        [paginator]="true"
        [rows]="5">

        <ng-template pTemplate="header">
            <tr>
                <th>Transaction Id</th>
                <th>Customer</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </ng-template>

        <ng-template
        pTemplate="body"
        let-transaction>

            <tr>
                <td>{{ transaction.id }}</td>
                <td>{{ transaction.customerName }}</td>
                <td>{{ transaction.amount }}</td>
                <td>{{ transaction.status }}</td>
                <td>

                    <p-button
                        icon="pi pi-trash"
                        severity="danger"
                        (onClick)="confirmDelete(transaction.id)">
                    </p-button>

                </td>
            </tr>

        </ng-template>

    </p-table>
    
</div>
